<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reports - Adopto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #fdf8f0; }

    .page-wrap { max-width: 820px; margin: 40px auto; padding: 0 20px 60px; }

    .page-title {
      font-size: 2rem; font-weight: 700; color: #333;
      margin-bottom: 30px; text-align: center;
    }

    .report-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px 24px;
      margin-bottom: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      border-left: 5px solid #f9a826;
    }
    .report-card.acknowledged { border-left-color: #4caf50; }
    .report-card.resolved     { border-left-color: #2196f3; }

    .report-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .report-top img {
      width: 90px; height: 90px;
      border-radius: 12px;
      object-fit: cover;
      border: 3px solid #f9a826;
      flex-shrink: 0;
    }
    .report-card.acknowledged .report-top img { border-color: #4caf50; }

    .report-info { flex: 1; }

    .report-animal {
      font-size: 1.2rem; font-weight: 700; color: #333; margin-bottom: 4px;
    }

    .report-location {
      font-size: 0.88rem; color: #888; margin-bottom: 8px;
    }

    .report-desc {
      font-size: 0.9rem; color: #555; margin-bottom: 10px; line-height: 1.5;
    }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 14px; border-radius: 99px;
      font-size: 0.82rem; font-weight: 700; margin-bottom: 6px;
    }
    .status-pill.pending      { background: #fff3e6; color: #b55a02; }
    .status-pill.acknowledged { background: #e8f9ee; color: #247a3e; }
    .status-pill.resolved     { background: #e8eeff; color: #1a3eb5; }

    .report-date { font-size: 0.8rem; color: #aaa; }

    .ngo-response {
      margin-top: 14px;
      background: #e8f9ee;
      border-left: 3px solid #4caf50;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #333;
      line-height: 1.5;
    }

    .ngo-response strong { color: #247a3e; }

    .empty-wrap {
      display: flex; align-items: center;
      justify-content: center; min-height: 60vh;
    }

    .empty-card {
      background: #fff; border-radius: 24px;
      padding: 50px 40px; text-align: center;
      max-width: 480px; width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    .empty-card .empty-icon { font-size: 4rem; margin-bottom: 16px; display: block; }
    .empty-card h3 { font-size: 1.5rem; font-weight: 700; color: #333; margin-bottom: 10px; }
    .empty-card p  { color: #888; font-size: 1rem; margin-bottom: 28px; }

    .btn-report {
      display: inline-block; background: #f9a826; color: #fff;
      padding: 14px 32px; border-radius: 30px; font-weight: 700;
      text-decoration: none; transition: background 0.2s;
    }
    .btn-report:hover { background: #e0930f; color: #fff; }

    .no-img-placeholder {
      width: 90px; height: 90px;
      border-radius: 12px;
      background: #fdf8f0;
      border: 3px solid #f9a826;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .loader { text-align: center; padding: 60px; color: #aaa; }

    /* Emergency footer */
    .emergency-footer {
      background: #fff0f0; border-top: 3px solid #f44336;
      padding: 20px; text-align: center; margin-top: 40px;
    }
    .emergency-footer h5 { color: #c62828; font-weight: 700; margin-bottom: 10px; }
    .emergency-numbers { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
    .emergency-number-item { text-align: center; }
    .emergency-number-item .num {
      font-size: 1.2rem; font-weight: 700; color: #c62828; display: block;
    }
    .emergency-number-item .label { font-size: 0.8rem; color: #666; }
  </style>
</head>
<body>
<div class="container-fluid">
  <header>
    <div class="logo">
      <img src="images/logo.jpeg" alt="Adopto Logo" class="logo-img">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="adoption.html">Adopt</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="auth-buttons">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#login-modal">
        Log In / Sign Up
      </button>
      <a href="#" class="profile-btn" onclick="openSidebar(); return false;" style="display:none;">Profile</a>
    </div>
  </header>

  <div class="page-wrap">
    <h2 class="page-title">🚨 My Reports</h2>
    <div id="reports-list"><div class="loader">⏳ Loading your reports...</div></div>
  </div>

  <div class="emergency-footer">
    <h5>🚨 Emergency Animal Helplines</h5>
    <div class="emergency-numbers">
      <div class="emergency-number-item">
        <span class="num"><a href="tel:1962" style="color:#c62828;text-decoration:none;">1962</a></span>
        <span class="label">Animal Helpline</span>
      </div>
      <div class="emergency-number-item">
        <span class="num"><a href="tel:18001805141" style="color:#c62828;text-decoration:none;">1800-180-5141</a></span>
        <span class="label">Wildlife SOS</span>
      </div>
      <div class="emergency-number-item">
        <span class="num"><a href="tel:+911125649900" style="color:#c62828;text-decoration:none;">+91-11-2564-9900</a></span>
        <span class="label">PETA India</span>
      </div>
      <div class="emergency-number-item">
        <span class="num"><a href="tel:18001031" style="color:#c62828;text-decoration:none;">1800-103-1</a></span>
        <span class="label">Blue Cross</span>
      </div>
    </div>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="profile-sidebar">
  <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  <div class="sidebar-pfp-wrap">
    <div class="sidebar-avatar">
      <img id="sidebar-pfp" src="" alt="Profile" style="display:none;">
      <span id="sidebar-initials"></span>
    </div>
    <label class="pfp-upload-btn" title="Change photo">
      📷
      <input type="file" accept="image/*" style="display:none;" onchange="handlePfpUpload(this)">
    </label>
  </div>
  <div class="sidebar-info">
    <div class="sidebar-name" id="sidebar-username">—</div>
    <div id="sidebar-admin-badge" style="display:none; margin-bottom:10px;">
      <span style="background:#f9a826;color:#fff;font-size:0.78rem;font-weight:700;padding:3px 12px;border-radius:99px;">🛡️ ADMIN</span>
    </div>
    <div class="sidebar-detail"><span class="sidebar-icon">✉️</span><span id="sidebar-email">—</span></div>
    <div class="sidebar-detail"><span class="sidebar-icon">📞</span><span id="sidebar-phone">—</span></div>
    <div class="sidebar-detail"><span class="sidebar-icon">👤</span><span id="sidebar-role-label">—</span></div>
  </div>
  <hr class="sidebar-divider">
  <div class="sidebar-actions">
    <a href="my-reports.html" class="sidebar-link">🚨 My Reports</a>
    <a href="my-adoptions.html" class="sidebar-link" id="sidebar-adoptions-link">🐾 My Adoptions</a>
    <a href="admin.html" class="sidebar-link" id="sidebar-dashboard-link" style="display:none;">⚙️ Admin Dashboard</a>
    <button class="sidebar-logout" onclick="logout()">🚪 Log Out</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const username = localStorage.getItem('username');
  const role     = localStorage.getItem('role');
  const userId   = localStorage.getItem('userId');
  const list     = document.getElementById('reports-list');

  if (!username) { window.location.href = 'index.html'; return; }

  showProfileState(username, role);

  if (!userId) { list.innerHTML = emptyState(); return; }

  try {
    const res  = await fetch(`https://adopto-a-pet-adoption-site-2.onrender.com/api/reports/user/${userId}`);
    const data = await res.json();

    if (!data || data.length === 0) { list.innerHTML = emptyState(); return; }

    list.innerHTML = data.map(r => {
      const reportedOn = new Date(r.reported_at).toLocaleString('en-IN', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      const imgEl = r.image_url
        ? `<img src="${r.image_url}" alt="Animal" onerror="this.style.display='none'">`
        : `<div class="no-img-placeholder">🐾</div>`;

      return `
        <div class="report-card ${r.status}">
          <div class="report-top">
            ${imgEl}
            <div class="report-info">
              <div class="report-animal">${r.animal_type || 'Animal'} reported</div>
              <div class="report-location">📍 ${r.location}</div>
              <div class="report-desc">${r.description || '—'}</div>
              <span class="status-pill ${r.status}">
                ${r.status === 'pending'      ? '⏳ Pending'      : ''}
                ${r.status === 'acknowledged' ? '✅ Acknowledged' : ''}
                ${r.status === 'resolved'     ? '🔵 Resolved'     : ''}
              </span>
              <div class="report-date">📅 Reported: ${reportedOn}</div>
            </div>
          </div>
          ${r.ngo_message ? `
          <div class="ngo-response">
            <strong>📢 Message from NGO:</strong><br>
            ${r.ngo_message}
          </div>` : ''}
        </div>
      `;
    }).join('');

  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="empty-card" style="margin:0 auto;"><span class="empty-icon">⚠️</span><h3>Could not load reports</h3></div>`;
  }
});

function emptyState() {
  return `
    <div class="empty-wrap">
      <div class="empty-card">
        <span class="empty-icon">🐾</span>
        <h3>No reports yet</h3>
        <p>Spotted a stray or injured animal? Report it and our NGO partners will help!</p>
        <a href="report.html" class="btn-report">Report an Animal 🚨</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
