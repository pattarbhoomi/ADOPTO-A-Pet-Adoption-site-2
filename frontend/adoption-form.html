<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adoption Application - Adopto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .adoption-form-page {
      max-width: 620px;
      margin: 40px auto;
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .adoption-form-page h2 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 30px;
    }
    .pet-prefill-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fdf8f0;
      border: 2px solid #f9a826;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    .pet-prefill-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #f9a826;
    }
    .pet-prefill-info h4 { margin: 0 0 4px; font-size: 1.2rem; font-weight: 700; color: #333; }
    .pet-prefill-info p  { margin: 0; font-size: 0.9rem; color: #888; }
    .form-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f9a826;
      margin: 24px 0 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #fdf8f0;
    }
    .form-label { font-weight: 600; color: #444; font-size: 0.95rem; }
    .form-control, .form-select {
      border-radius: 10px;
      padding: 11px 14px;
      border: 1px solid #ddd;
      font-size: 0.95rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: #f9a826;
      box-shadow: 0 0 0 0.2rem rgba(249,168,38,0.2);
    }
    .interview-options { display: flex; gap: 20px; margin-top: 6px; }
    .interview-options label { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; }
    .agree-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fdf8f0;
      padding: 14px 16px;
      border-radius: 10px;
      margin-top: 10px;
    }
    .agree-row input { margin-top: 3px; cursor: pointer; flex-shrink: 0; }
    .agree-row label  { font-size: 0.9rem; color: #555; cursor: pointer; }
    .submit-application-btn {
      width: 100%;
      padding: 14px;
      background: #f9a826;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 24px;
    }
    .submit-application-btn:hover { background: #e0930f; }
    .submit-application-btn:disabled { background: #ccc; cursor: not-allowed; }
    #form-msg { text-align: center; font-size: 0.95rem; margin-top: 12px; }
  </style>
</head>
<body>
<div class="container-fluid">
  <header>
    <div class="logo">
      <img src="images/logo.jpeg" alt="Adopto Logo" class="logo-img">
    </div>
    
    <div class="auth-buttons">
      
        <button class="btn btn-primary" id="login-signup-btn" data-bs-toggle="modal" data-bs-target="#login-modal"></button>
       
      </button>
      <a href="#" class="profile-btn" onclick="openSidebar(); return false;" style="display:none;">Profile</a>
    </div>
  </header>

  <div class="adoption-form-page">
    <h2>Adoption Application</h2>

    <div class="pet-prefill-card">
      <img id="form-pet-img" src="images/logo.jpeg" alt="Pet" onerror="this.src='images/logo.jpeg'">
      <div class="pet-prefill-info">
        <h4 id="form-pet-name">Loading...</h4>
        <p id="form-pet-details">Please wait</p>
      </div>
    </div>

    <form id="adoptionForm">
      <div class="form-section-title">👤 Your Details</div>
      <div class="mb-3">
        <label class="form-label">Your Name *</label>
        <input type="text" id="adopter-name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Your Email *</label>
        <input type="email" id="adopter-email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Your Phone *</label>
        <input type="tel" id="adopter-phone" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Your Address *</label>
        <textarea id="adopter-address" class="form-control" rows="3" required></textarea>
      </div>

      <div class="form-section-title">🐾 About the Adoption</div>
      <div class="mb-3">
        <label class="form-label">Why do you want to adopt this pet? *</label>
        <textarea id="adopt-reason" class="form-control" rows="3" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Where will the pet stay when you're not at home? *</label>
        <textarea id="pet-stay" class="form-control" rows="2" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Name of person who will care for the pet *</label>
        <input type="text" id="caretaker-name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contact of that person *</label>
        <input type="text" id="caretaker-contact" class="form-control" required>
      </div>

      <div class="form-section-title">🏠 Home Details</div>
      <div class="mb-3">
        <label class="form-label">What is your home condition? *</label>
        <select id="home-condition" class="form-select" required>
          <option value="" disabled selected>Choose...</option>
          <option value="House with garden">House with garden</option>
          <option value="House without garden">House without garden</option>
          <option value="Apartment">Apartment</option>
          <option value="Farm">Farm</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">How many people live with you? *</label>
        <input type="number" id="people-count" class="form-control" min="0" required>
      </div>

      <div class="form-section-title">📄 Documents</div>
      <div class="mb-3">
        <label class="form-label">Upload a photo of your ID or other documents *</label>
        <input type="file" id="adopter-doc" class="form-control" accept="image/*,.pdf" required>
      </div>

      <div class="form-section-title">📞 Interview</div>
      <div class="mb-3">
        <label class="form-label">Preferred Interview Method *</label>
        <div class="interview-options">
          <label><input type="radio" name="interview-method" value="Video Call" required> Video Call</label>
          <label><input type="radio" name="interview-method" value="Physical Visit"> Physical Visit</label>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Interview Contact Details (Phone or Email) *</label>
        <input type="text" id="interview-contact" class="form-control" required>
      </div>

      <div class="agree-row">
        <input type="checkbox" id="agree-interview" required>
        <label for="agree-interview">I agree to a mandatory interview to proceed with the adoption.</label>
      </div>

      <div id="form-msg"></div>
      <button type="submit" class="submit-application-btn" id="submit-btn">Submit Application</button>
    </form>
  </div>
</div>

<!-- Sidebar Overlay -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Profile Sidebar -->
<div id="profile-sidebar">
  <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  <div class="sidebar-pfp-wrap">
    <div class="sidebar-avatar">
      <img id="sidebar-pfp" src="" alt="Profile" style="display:none;">
      <span id="sidebar-initials"></span>
    </div>
    <label class="pfp-upload-btn" title="Change photo">
      📷
      <input type="file" accept="image/*" style="display:none;" onchange="handlePfpUpload(this)">
    </label>
  </div>
  <div class="sidebar-info">
    <div class="sidebar-name" id="sidebar-username">—</div>
    <div id="sidebar-admin-badge" style="display:none; margin-bottom:10px;">
      <span style="background:#f9a826;color:#fff;font-size:0.78rem;font-weight:700;padding:3px 12px;border-radius:99px;">🛡️ ADMIN</span>
    </div>
    <div class="sidebar-detail"><span class="sidebar-icon">✉️</span><span id="sidebar-email">—</span></div>
    <div class="sidebar-detail"><span class="sidebar-icon">📞</span><span id="sidebar-phone">—</span></div>
    <div class="sidebar-detail"><span class="sidebar-icon">👤</span><span id="sidebar-role-label">—</span></div>
  </div>
  <hr class="sidebar-divider">
  <div class="sidebar-actions">
    <a href="my-adoptions.html" class="sidebar-link" id="sidebar-adoptions-link">🐾 My Adoptions</a>
    <a href="admin.html" class="sidebar-link" id="sidebar-dashboard-link" style="display:none;">⚙️ Admin Dashboard</a>
    <button class="sidebar-logout" onclick="logout()">🚪 Log Out</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const petId     = urlParams.get('id');
const petName   = urlParams.get('pet');

let currentPet = {};

window.addEventListener('DOMContentLoaded', async () => {

  // ── If already submitted, go to my-adoptions instead of showing form again ──
  if (sessionStorage.getItem('formSubmitted') === 'true') {
    sessionStorage.removeItem('formSubmitted');
    window.location.replace('my-adoptions.html');
    return;
  }

  const username = localStorage.getItem('username');
  const role     = localStorage.getItem('role');

  if (!username) {
    alert('Please log in to submit an adoption application.');
    window.location.href = 'adoption.html';
    return;
  }

  showProfileState(username, role);

  // Prefill adopter details
  document.getElementById('adopter-name').value  = username;
  document.getElementById('adopter-email').value = localStorage.getItem('email') || '';
  document.getElementById('adopter-phone').value = localStorage.getItem('phone') || '';

  // Prefill pet details from API
  if (petId) {
    try {
      const res  = await fetch('http://localhost:5000/api/pets');
      const pets = await res.json();
      const pet  = pets.find(p => p.id == petId);

      if (pet) {
        currentPet = pet;
        document.getElementById('form-pet-img').src             = pet.image_url || 'images/logo.jpeg';
        document.getElementById('form-pet-name').textContent    = pet.name;
        document.getElementById('form-pet-details').textContent =
          [pet.type, pet.breed, pet.age ? pet.age + ' yr' : ''].filter(Boolean).join(' · ');
      }
    } catch (err) {
      console.error('Error fetching pet:', err);
      document.getElementById('form-pet-name').textContent    = petName || '—';
      document.getElementById('form-pet-details').textContent = '—';
    }
  } else if (petName) {
    document.getElementById('form-pet-name').textContent = petName;
  }
});

document.getElementById('adoptionForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const msgEl     = document.getElementById('form-msg');
  const submitBtn = document.getElementById('submit-btn');
  msgEl.textContent = '';

  const username = localStorage.getItem('username');
  const userId   = localStorage.getItem('userId');

  if (!username) {
    msgEl.style.color = '#c62828';
    msgEl.textContent = '❌ Please log in first.';
    return;
  }

  const interviewMethod = document.querySelector('input[name="interview-method"]:checked');
  if (!interviewMethod) {
    msgEl.style.color = '#c62828';
    msgEl.textContent = '❌ Please select a preferred interview method.';
    return;
  }

  if (!document.getElementById('agree-interview').checked) {
    msgEl.style.color = '#c62828';
    msgEl.textContent = '❌ You must agree to the mandatory interview.';
    return;
  }

  const docFile = document.getElementById('adopter-doc').files[0];
  if (!docFile) {
    msgEl.style.color = '#c62828';
    msgEl.textContent = '❌ Please upload an ID or document.';
    return;
  }

  const formData = new FormData();
  formData.append('user_id',           userId   || '');
  formData.append('pet_id',            petId    || '');
  formData.append('name',              document.getElementById('adopter-name').value.trim());
  formData.append('email',             document.getElementById('adopter-email').value.trim());
  formData.append('phone',             document.getElementById('adopter-phone').value.trim());
  formData.append('address',           document.getElementById('adopter-address').value.trim());
  formData.append('pet_name',          currentPet.name  || petName || '');
  formData.append('pet_breed',         currentPet.breed || '');
  formData.append('pet_age',           currentPet.age   || '');
  formData.append('pet_type',          currentPet.type  || '');
  formData.append('reason',            document.getElementById('adopt-reason').value.trim());
  formData.append('pet_stay',          document.getElementById('pet-stay').value.trim());
  formData.append('caretaker_name',    document.getElementById('caretaker-name').value.trim());
  formData.append('caretaker_contact', document.getElementById('caretaker-contact').value.trim());
  formData.append('home_condition',    document.getElementById('home-condition').value);
  formData.append('people_count',      document.getElementById('people-count').value);
  formData.append('interview_method',  interviewMethod.value);
  formData.append('interview_contact', document.getElementById('interview-contact').value.trim());
  formData.append('agreed_interview',  'true');
  formData.append('document',          docFile);

  try {
    msgEl.style.color = '#888';
    msgEl.textContent = '⏳ Submitting application...';
    submitBtn.disabled = true;

    const res  = await fetch('http://localhost:5000/api/adoptions', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (res.ok) {
      // Mark as submitted so back-navigation won't show form again
      sessionStorage.setItem('formSubmitted', 'true');

      const meta   = [currentPet.breed, currentPet.type, currentPet.age ? currentPet.age + ' yr' : '']
                       .filter(Boolean).join(' · ');
      const imgUrl = currentPet.image_url || '';
      const name   = currentPet.name || petName || '';

      // replace() removes this page from history — back button skips it
      window.location.replace(
        `form-submitted.html?pet=${encodeURIComponent(name)}&image=${encodeURIComponent(imgUrl)}&meta=${encodeURIComponent(meta)}`
      );

    } else {
      msgEl.style.color = '#c62828';
      msgEl.textContent = '❌ ' + (data.error || 'Failed to submit. Please try again.');
      submitBtn.disabled = false;
    }
  } catch (err) {
    console.error(err);
    msgEl.style.color = '#c62828';
    msgEl.textContent = '❌ Cannot reach server. Is it running?';
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
