<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoption Certificate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <header>
            <div class="logo">
                <img src="images/logo.jpeg" alt="Adopto Logo" class="logo-img">
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="adoption.html">Adopt</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                
                <a href="#" class="profile-btn" style="display: none;">Profile</a>
                <a href="#" class="logout-btn" style="display: none;">Log Out</a>
            </div>
        </header>
    <div class="certificate-container">
        <div class="certificate">
            <div class="certificate-header">
                <h1>Certificate of Adoption</h1>
            </div>
            <div class="certificate-body">
                <p>This certificate is proudly presented to</p>
                <h2 id="adopter-name"></h2>
                <p>for giving a loving home to</p>
                <h2 id="pet-name"></h2>
                <div class="pet-image-container">
                    <img id="pet-image" src="" alt="Adopted Pet">
                </div>
                <p>on this day, <span id="adoption-date"></span></p>
            </div>
            <div class="certificate-footer">
                <p>Thank you for choosing adoption!</p>
                <div class="logo">
                    <img src="images/logo.jpeg" alt="Adopto Logo" class="logo-img">
                </div>
            </div>
        </div>
    </div>
    <div class="button-container">
        <button id="print-btn" class="btn btn-primary">Print Certificate</button>
        <button id="download-btn" class="btn btn-secondary">Download as PDF</button>
    </div>

    
   <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const p = new URLSearchParams(window.location.search);

    document.getElementById('adopter-name').textContent  = p.get('adopter') || '—';
    document.getElementById('pet-name').textContent      = p.get('pet')     || '—';
    document.getElementById('adoption-date').textContent = p.get('date')    || new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

    const img = p.get('image');
    if (img) document.getElementById('pet-image').src = decodeURIComponent(img);

    document.getElementById('print-btn').addEventListener('click', () => window.print());

    document.getElementById('download-btn').addEventListener('click', () => {
      const certificate = document.querySelector('.certificate');
      html2pdf().from(certificate).set({
        margin:     0.5,
        filename:   `Adopto-Certificate-${p.get('pet') || 'Pet'}.pdf`,
        image:      { type: 'jpeg', quality: 0.98 },
        html2canvas:{ scale: 2 },
        jsPDF:      { unit: 'in', format: 'letter', orientation: 'portrait' }
      }).save();
    });
  });
</script>
    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
